<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Forward SoCal Bistro — Menu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .menu-wrap {
    width: 100%;
    max-width: 1400px;
  }
  .menu-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }
  @media print {
    body { margin: 0; }
    .menu-wrap { max-width: 100%; }
    @page { margin: 0.25in; size: landscape letter; }
  }
</style>
</head>
<body>
  <div class="menu-wrap">
    <img src="menu-full-spread.png" alt="Nature Forward SoCal Bistro — Full Menu">
  </div>
</body>
</html>
